name: Build GM2 Play APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17 (pré-instalado no runner)
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_17_X64/bin" >> $GITHUB_PATH

      - name: Configurar Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Aceitar licenças do Android SDK
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Instalar platform e build-tools Android 34
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" > /dev/null 2>&1 || true

      - name: Criar local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build APK
        run: gradle :app:assembleDebug

      - name: Upload APK GM2 Play
        uses: actions/upload-artifact@v4
        with:
          name: GM2Play-Desbloqueado
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Resumo
        run: |
          echo "## GM2 Play — APK Gerado" >> $GITHUB_STEP_SUMMARY
          echo "Baixe o artifact **GM2Play-Desbloqueado** na seção Artifacts desta execução." >> $GITHUB_STEP_SUMMARY
