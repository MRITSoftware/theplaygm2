name: Build GM2 Play APKs

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar APKs
    runs-on: ubuntu-latest

    steps:

      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Aceitar licenças do Android SDK
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Instalar platform e build-tools Android 34
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" > /dev/null 2>&1 || true

      - name: Criar local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build APK BLOQUEADO
        run: gradle :app:assembleBloqueadoDebug

      - name: Build APK DESBLOQUEADO
        run: gradle :app:assembleDesbloqueadoDebug

      - name: Upload APK BLOQUEADO
        uses: actions/upload-artifact@v4
        with:
          name: GM2Play-BLOQUEADO
          path: app/build/outputs/apk/bloqueado/debug/app-bloqueado-debug.apk
          retention-days: 30

      - name: Upload APK DESBLOQUEADO
        uses: actions/upload-artifact@v4
        with:
          name: GM2Play-DESBLOQUEADO
          path: app/build/outputs/apk/desbloqueado/debug/app-desbloqueado-debug.apk
          retention-days: 30

      - name: Resumo dos APKs gerados
        run: |
          echo "## GM2 Play — APKs Gerados" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | BuildConfig.DESBLOQUEADO | Comportamento |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------------------------|---------------|" >> $GITHUB_STEP_SUMMARY
          echo "| GM2Play-BLOQUEADO | \`false\` | Exibe tela de bloqueio |" >> $GITHUB_STEP_SUMMARY
          echo "| GM2Play-DESBLOQUEADO | \`true\` | App completo com YouTube/TV/Offline |" >> $GITHUB_STEP_SUMMARY
